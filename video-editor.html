  .btn-replay:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .btn-export { background: #fff; color: #111; }
  .btn-export:hover { background: #e0e0e0; }

  /* ══ MAIN LAYOUT ══ */
  .editor { display: flex; flex: 1; overflow: hidden; }

  /* ── LEFT PANEL ── */
  .panel {
    width: 340px; background: #131313; border-right: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; flex-shrink: 0;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .panel-header {
    padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 3px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-header span { font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 1px; text-transform: none; font-weight: 500; }

  .scene-block { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .scene-block.active { background: rgba(255,255,255,0.02); }
  .scene-head {
    padding: 12px 20px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none; transition: background 0.1s;
  }
  .scene-head:hover { background: rgba(255,255,255,0.03); }
  .scene-num {
    width: 24px; height: 24px; border-radius: 6px; background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); flex-shrink: 0;

  .scene-block.active .scene-num { background: #fff; color: #111; }
  .scene-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); flex: 1; }
  .scene-time { font-size: 11px; color: rgba(255,255,255,0.2); font-variant-numeric: tabular-nums; }
  .scene-arrow { font-size: 10px; color: rgba(255,255,255,0.15); transition: transform 0.2s; }
  .scene-block.open .scene-arrow { transform: rotate(90deg); }

  .scene-body { padding: 0 20px 16px; display: none; }
  .scene-block.open .scene-body { display: block; }

  .field-group { margin-bottom: 10px; }
  .field-label {
    font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.25);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
  }
  .field-input {
    width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
    color: #fff; font-family: inherit; font-size: 13px; outline: none;
    transition: border-color 0.15s;

  textarea.field-input { resize: vertical; min-height: 52px; line-height: 1.5; }

  .preview-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #0a0a0a; position: relative; overflow: hidden;
  }
  .preview-wrap { position: relative; }
  .preview-frame {
    border: none; background: #f5f5f7; border-radius: 12px; overflow: hidden;
    box-shadow: 0 0 80px rgba(0,0,0,0.6);

    width: 240px; background: #131313; border-left: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; flex-shrink: 0;

  .prop-label { font-size: 12px; color: rgba(255,255,255,0.35); }
  .prop-value { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; font-variant-numeric: tabular-nums; }

  .timeline {
    height: 72px; background: #131313; border-top: 1px solid rgba(255,255,255,0.06);
    padding: 10px 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px;

  .tl-current { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6); font-variant-numeric: tabular-nums; min-width: 36px; }
  .tl-track { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; position: relative; cursor: pointer; }
  .tl-fill { height: 100%; background: #fff; border-radius: 2px; width: 0; pointer-events: none; }
  .tl-total { font-size: 12px; color: rgba(255,255,255,0.2); font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
  .tl-scenes { display: flex; gap: 2px; }
  .tl-scene {
    height: 22px; background: rgba(255,255,255,0.03); border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.15);
    cursor: pointer; transition: all 0.15s;
  }
  .tl-scene:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }
  .tl-scene.active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #222; color: #fff; padding: 10px 24px; border-radius: 10px;
    font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

</div>

const TOTAL = 43;
let activeScene = 0;
let playStart = 0;
let elapsed = 0;
let playing = false;
let raf = null;

// ═══ BUILD UI ═══
function init() {
  buildScenes();
  buildTimeline();
  loadPreview();
}

function buildScenes() {
  const list = document.getElementById('sceneList');
  scenes.forEach((sc, i) => {
    const block = document.createElement('div');
    block.className = 'scene-block' + (i === 0 ? ' open active' : '');
    block.id = 'sb-' + i;

    const head = document.createElement('div');
    head.className = 'scene-head';
    head.innerHTML = '<div class="scene-num">' + (i+1) + '</div><div class="scene-name">' + sc.name + '</div><div class="scene-time">' + fmt(sc.start) + ' → ' + fmt(sc.end) + '</div><div class="scene-arrow">▶</div>';
    head.onclick = () => { block.classList.toggle('open'); setActive(i); };

    const body = document.createElement('div');
    body.className = 'scene-body';

    sc.fields.forEach(f => {
      const g = document.createElement('div');
      g.className = 'field-group';
      const l = document.createElement('div');
      l.className = 'field-label';
      l.textContent = f.label;
      let inp;
      if (f.ta) {
        inp = document.createElement('textarea');
        inp.className = 'field-input';
        inp.value = f.val;
        inp.rows = 2;
      } else {
        inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'field-input';
        inp.value = f.val;
      }
      inp.dataset.key = f.key;
      inp.oninput = () => { f.val = inp.value; liveUpdate(f.key, inp.value); };
      g.appendChild(l);
      g.appendChild(inp);
      body.appendChild(g);
    });

    block.appendChild(head);
    block.appendChild(body);
    list.appendChild(block);
  });
}

function setActive(i) {
  activeScene = i;
  document.querySelectorAll('.scene-block').forEach((b,idx) => b.classList.toggle('active', idx===i));
  document.querySelectorAll('.tl-scene').forEach((s,idx) => s.classList.toggle('active', idx===i));
}

function buildTimeline() {
  const c = document.getElementById('tlScenes');
  scenes.forEach((sc, i) => {
    const d = document.createElement('div');
    d.className = 'tl-scene' + (i===0?' active':'');
    d.textContent = 'S' + (i+1);
    d.title = sc.name;
    d.style.flex = (sc.end - sc.start);
    d.onclick = () => setActive(i);
    c.appendChild(d);
  });
}

// ═══ PREVIEW (iframe with embedded HTML) ═══
function loadPreview() {
  const iframe = document.getElementById('preview');
  const blob = new Blob([VIDEO_HTML], {type:'text/html'});
  iframe.src = URL.createObjectURL(blob);
  iframe.onload = () => {
    iframe.style.width = '1080px';
    iframe.style.height = '1350px';
    iframe.style.transform = 'scale(0.45)';
    iframe.style.transformOrigin = 'center center';
    const wrap = document.querySelector('.preview-wrap');
    wrap.style.width = (1080*0.45)+'px';
    wrap.style.height = (1350*0.45)+'px';
    playing = true;
    playStart = performance.now();
    elapsed = 0;
    tick();
  };
}

function liveUpdate(key, value) {
  const iframe = document.getElementById('preview');
  if (!iframe.contentDocument) return;
  try {
    const el = iframe.contentDocument.querySelector('[data-field="'+key+'"]');
    if (el) el.textContent = value;
  } catch(e) {}
}

// ═══ PLAYBACK TIMER ═══
function tick() {
  if (!playing) return;
  elapsed = (performance.now() - playStart) / 1000;
  if (elapsed >= TOTAL) { elapsed = TOTAL; playing = false; }
  const pct = (elapsed/TOTAL)*100;
  document.getElementById('tlFill').style.width = pct+'%';
  document.getElementById('tlTime').textContent = fmt(elapsed);
  for (let i = scenes.length-1; i >= 0; i--) {
    if (elapsed >= scenes[i].start) { if (i !== activeScene) setActive(i); break; }
  }
  if (playing) raf = requestAnimationFrame(tick);
}

function replayVideo() {
  // Reload iframe to restart all CSS animations
  const iframe = document.getElementById('preview');
  const blob = new Blob([VIDEO_HTML], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  iframe.src = url;
  iframe.onload = () => {
    // Re-apply all current field values
    scenes.forEach(sc => sc.fields.forEach(f => liveUpdate(f.key, f.val)));
    // Reset timer
    playing = true;
    playStart = performance.now();
    elapsed = 0;
    tick();
    showToast('Replay !');
  };
}

// ═══ EXPORT ═══
function exportHTML() {
  // Build modified HTML by replacing data-field content
  let html = VIDEO_HTML;
  scenes.forEach(sc => {
    sc.fields.forEach(f => {
      // Find the element with data-field and replace its text content
      const regex = new RegExp('(data-field="'+f.key+'">)([^<]*)', 'g');
      html = html.replace(regex, '$1' + escapeHTML(f.val));
    });
  });
  // Remove data-field attributes for clean export
  html = html.replace(/ data-field="[^"]*"/g, '');

  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'video-linkedin-edited.html';
  a.click();
  showToast('HTML exporte !');
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══ UTILS ═══
function fmt(s) { return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.key==='r'||e.key==='R') { e.preventDefault(); replayVideo(); }
  if (e.key==='e'||e.key==='E') { e.preventDefault(); exportHTML(); }
});
