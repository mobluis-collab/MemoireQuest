<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Pulse — Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #04030e;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Toggle ── */
  .toggle-bar {
    position: fixed;
    top: 20px;
    display: flex;
    gap: 10px;
    z-index: 999;
  }
  .toggle-bar button {
    padding: 8px 18px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .toggle-bar button:hover {
    background: rgba(255,255,255,0.1);
  }
  .toggle-bar button.active {
    background: rgba(255,255,255,0.15);
    color: white;
    border-color: rgba(255,255,255,0.3);
  }

  /* ── Fake dashboard behind ── */
  .fake-dashboard {
    position: fixed;
    inset: 0;
    display: flex;
    transition: background 0.5s;
  }
  .fake-dashboard.light {
    background: #f5f5f7;
  }
  .fake-dashboard.dark {
    background: #04030e;
  }
  .fake-sidebar {
    width: 260px;
    border-right: 1px solid;
    padding: 30px 20px;
    transition: all 0.5s;
  }
  .dark .fake-sidebar {
    border-color: rgba(255,255,255,0.06);
  }
  .light .fake-sidebar {
    border-color: rgba(0,0,0,0.08);
  }
  .fake-sidebar-item {
    height: 36px;
    border-radius: 10px;
    margin-bottom: 8px;
    transition: background 0.5s;
  }
  .dark .fake-sidebar-item { background: rgba(255,255,255,0.04); }
  .light .fake-sidebar-item { background: rgba(0,0,0,0.04); }
  .dark .fake-sidebar-item:nth-child(2) { background: rgba(255,255,255,0.08); }
  .light .fake-sidebar-item:nth-child(2) { background: rgba(0,0,0,0.08); }

  .fake-content {
    flex: 1;
    padding: 40px;
  }
  .fake-card {
    height: 60px;
    border-radius: 12px;
    margin-bottom: 12px;
    transition: background 0.5s, border-color 0.5s;
  }
  .dark .fake-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
  .light .fake-card { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06); }

  /* ── Overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: backdrop-filter 0.3s;
  }
  .overlay.visible {
    opacity: 1;
    pointer-events: auto;
    animation: overlay-in 0.3s ease both;
  }
  .overlay.dark-bg {
    background: rgba(4, 3, 14, 0.78);
    backdrop-filter: blur(6px);
  }
  .overlay.light-bg {
    background: rgba(245, 245, 247, 0.82);
    backdrop-filter: blur(6px);
  }

  /* ── Center content ── */
  .celebrate {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ── Glow circle ── */
  .glow-ring {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 28px;
  }
  .glow-ring.dark-mode {
    border: 1.5px solid rgba(255,255,255,0.18);
  }
  .glow-ring.light-mode {
    border: 1.5px solid rgba(0,0,0,0.14);
  }

  .overlay.visible .glow-ring {
    animation: glow-pulse-anim 2s ease-in-out;
  }

  /* ── Checkmark ── */
  .checkmark {
    font-size: 34px;
    font-weight: 200;
    opacity: 0;
    transform: scale(0.7);
    line-height: 1;
  }
  .checkmark.dark-mode { color: rgba(255,255,255,0.90); }
  .checkmark.light-mode { color: rgba(0,0,0,0.85); }

  .overlay.visible .checkmark {
    animation: check-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
  }

  /* ── Title ── */
  .title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.8px;
    line-height: 1.15;
    opacity: 0;
  }
  .title.dark-mode { color: rgba(255,255,255,0.92); }
  .title.light-mode { color: rgba(0,0,0,0.88); }

  .overlay.visible .title {
    animation: text-up 0.5s ease-out 0.4s both;
  }

  /* ── Subtitle ── */
  .subtitle {
    font-size: 14px;
    font-weight: 400;
    max-width: 280px;
    line-height: 1.45;
    margin-top: 10px;
    opacity: 0;
  }
  .subtitle.dark-mode { color: rgba(255,255,255,0.45); }
  .subtitle.light-mode { color: rgba(0,0,0,0.45); }

  .overlay.visible .subtitle {
    animation: text-up 0.5s ease-out 0.55s both;
  }

  /* ── XP badge ── */
  .xp-badge {
    margin-top: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 6px 16px;
    border-radius: 99px;
    opacity: 0;
  }
  .xp-badge.dark-mode {
    color: rgba(255,255,255,0.50);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .xp-badge.light-mode {
    color: rgba(0,0,0,0.45);
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.08);
  }

  .overlay.visible .xp-badge {
    animation: text-up 0.4s ease-out 0.7s both;
  }

  /* ── Keyframes ── */
  @keyframes overlay-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes glow-pulse-anim {
    0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    20%  { box-shadow: 0 0 50px 18px rgba(255,255,255,0.10); }
    40%  { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    60%  { box-shadow: 0 0 40px 14px rgba(255,255,255,0.07); }
    80%  { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }

  @keyframes glow-pulse-light {
    0%   { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    20%  { box-shadow: 0 0 50px 18px rgba(0,0,0,0.07); }
    40%  { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    60%  { box-shadow: 0 0 40px 14px rgba(0,0,0,0.04); }
    80%  { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  }

  @keyframes check-in {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes text-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Light mode glow override */
  .overlay.visible .glow-ring.light-mode {
    animation: glow-pulse-light 2s ease-in-out;
  }

  /* ── Replay button ── */
  .replay {
    position: fixed;
    bottom: 30px;
    padding: 12px 28px;
    border-radius: 99px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 999;
    transition: all 0.3s;
  }
  .replay.dark-mode {
    background: rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .replay.dark-mode:hover {
    background: rgba(255,255,255,0.15);
  }
  .replay.light-mode {
    background: rgba(0,0,0,0.07);
    color: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,0,0,0.10);
  }
  .replay.light-mode:hover {
    background: rgba(0,0,0,0.12);
  }
</style>
</head>
<body>

<!-- Toggle -->
<div class="toggle-bar">
  <button id="btn-dark" class="active" onclick="setTheme('dark')">Dark mode</button>
  <button id="btn-light" onclick="setTheme('light')">Light mode</button>
</div>

<!-- Fake dashboard -->
<div id="dashboard" class="fake-dashboard dark">
  <div class="fake-sidebar">
    <div class="fake-sidebar-item"></div>
    <div class="fake-sidebar-item"></div>
    <div class="fake-sidebar-item"></div>
    <div class="fake-sidebar-item"></div>
    <div class="fake-sidebar-item"></div>
  </div>
  <div class="fake-content">
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
  </div>
</div>

<!-- Overlay -->
<div id="overlay" class="overlay visible dark-bg">
  <div class="celebrate">
    <div id="ring" class="glow-ring dark-mode">
      <span id="check" class="checkmark dark-mode">&#10003;</span>
    </div>
    <div id="title" class="title dark-mode">Chapitre validé</div>
    <div id="subtitle" class="subtitle dark-mode">Description de l'entreprise et établissement de la relation consultant/client</div>
    <div id="xp" class="xp-badge dark-mode">+45 XP accordé</div>
  </div>
</div>

<!-- Replay -->
<button id="replay" class="replay dark-mode" onclick="replayAnim()">Rejouer l'animation</button>

<script>
  let currentTheme = 'dark';

  function setTheme(theme) {
    currentTheme = theme;
    const dash = document.getElementById('dashboard');
    const overlay = document.getElementById('overlay');
    const ring = document.getElementById('ring');
    const check = document.getElementById('check');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const xp = document.getElementById('xp');
    const replay = document.getElementById('replay');
    const btnDark = document.getElementById('btn-dark');
    const btnLight = document.getElementById('btn-light');

    const mode = theme === 'dark' ? 'dark-mode' : 'light-mode';
    const bgClass = theme === 'dark' ? 'dark-bg' : 'light-bg';

    dash.className = 'fake-dashboard ' + theme;
    overlay.className = 'overlay visible ' + bgClass;

    ring.className = 'glow-ring ' + mode;
    check.className = 'checkmark ' + mode;
    title.className = 'title ' + mode;
    subtitle.className = 'subtitle ' + mode;
    xp.className = 'xp-badge ' + mode;
    replay.className = 'replay ' + mode;

    btnDark.classList.toggle('active', theme === 'dark');
    btnLight.classList.toggle('active', theme === 'light');

    // Re-trigger
    replayAnim();
  }

  function replayAnim() {
    const overlay = document.getElementById('overlay');
    const bgClass = currentTheme === 'dark' ? 'dark-bg' : 'light-bg';

    overlay.classList.remove('visible');
    void overlay.offsetWidth; // force reflow
    overlay.classList.add('visible');
  }
</script>
</body>
</html>
