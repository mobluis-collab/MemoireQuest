<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maimouarkwest — Notes / Pense-bêtes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #04030e;
    color: rgba(255,255,255,0.85);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  .layout {
    display: flex;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    background: rgba(255,255,255,0.03);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    padding: 0 20px;
    margin-bottom: 16px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
  }
  .sidebar-item:hover {
    background: rgba(255,255,255,0.04);
  }
  .sidebar-item.active {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.9);
  }
  .sidebar-item svg {
    width: 18px;
    height: 18px;
    opacity: 0.6;
  }
  .sidebar-item.active svg {
    opacity: 1;
  }
  .sidebar-spacer { flex: 1; }

  /* ── Notes icon in sidebar (the new one) ── */
  .sidebar-item.notes-item {
    position: relative;
  }
  .notes-badge {
    margin-left: auto;
    font-size: 11px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.45);
    padding: 1px 7px;
    border-radius: 8px;
  }

  /* ── Main content ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Notes panel ── */
  .notes-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Notes list (left) ── */
  .notes-list {
    width: 280px;
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.015);
    transition: width 0.2s ease, opacity 0.15s ease;
    overflow: hidden;
    flex-shrink: 0;
  }
  .notes-list.collapsed {
    width: 0;
    border-right: none;
    opacity: 0;
  }
  .notes-list-header {
    padding: 24px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .notes-list-title {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
  }
  .notes-list-subtitle {
    padding: 0 20px 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    line-height: 1.5;
  }
  .btn-new-note {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 18px;
  }
  .btn-new-note:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.95);
  }

  .notes-search {
    margin: 0 16px 12px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .notes-search::placeholder {
    color: rgba(255,255,255,0.25);
  }
  .notes-search:focus {
    border-color: rgba(255,255,255,0.2);
  }

  .notes-items {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
  }
  .note-card {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.12s;
  }
  .note-card:hover {
    background: rgba(255,255,255,0.04);
  }
  .note-card.active {
    background: rgba(255,255,255,0.07);
  }
  .note-card-title {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-card-preview {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .note-card-date {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
  }

  /* ── Editor (right) ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Toolbar */
  .editor-toolbar {
    padding: 12px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .toolbar-btn {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.12s;
  }
  .toolbar-btn:hover {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.8);
  }
  .toolbar-btn.active {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.95);
  }
  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.08);
    margin: 0 6px;
  }
  .toolbar-spacer { flex: 1; }
  .toolbar-delete {
    color: rgba(255,255,255,0.25);
  }
  .toolbar-delete:hover {
    color: rgba(255,100,100,0.7);
    background: rgba(255,100,100,0.08);
  }

  /* Editor area */
  .editor-area {
    flex: 1;
    padding: 32px 48px;
    overflow-y: auto;
  }
  .editor-title {
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
    margin-bottom: 8px;
    padding: 0;
  }
  .editor-title::placeholder {
    color: rgba(255,255,255,0.2);
  }
  .editor-date {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    margin-bottom: 24px;
  }
  .editor-content {
    min-height: 300px;
    outline: none;
    font-size: 15px;
    line-height: 1.75;
    color: rgba(255,255,255,0.75);
  }
  .editor-content:empty::before {
    content: "Commence à écrire...";
    color: rgba(255,255,255,0.2);
  }
  .editor-content b { font-weight: 600; color: rgba(255,255,255,0.9); }
  .editor-content i { font-style: italic; }
  .editor-content u { text-decoration: underline; }
  .editor-content mark {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.9);
    padding: 1px 3px;
    border-radius: 2px;
  }

  /* ── Empty state ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: rgba(255,255,255,0.25);
  }
  .empty-state svg {
    width: 48px;
    height: 48px;
    opacity: 0.3;
  }
  .empty-state-text {
    font-size: 14px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    font-size: 12px;
    z-index: 100;
  }

  /* Light mode */
  body.light {
    background: #f5f5f0;
    color: rgba(0,0,0,0.85);
  }
  .light .sidebar {
    background: rgba(0,0,0,0.02);
    border-right-color: rgba(0,0,0,0.06);
  }
  .light .sidebar-title { color: rgba(0,0,0,0.4); }
  .light .sidebar-item { color: rgba(0,0,0,0.5); }
  .light .sidebar-item:hover { background: rgba(0,0,0,0.04); }
  .light .sidebar-item.active { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.9); }
  .light .notes-badge { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.45); }
  .light .notes-list { border-right-color: rgba(0,0,0,0.06); background: rgba(0,0,0,0.01); }
  .light .notes-list.collapsed { border-right: none; }
  .light .notes-list-title { color: rgba(0,0,0,0.9); }
  .light .notes-list-subtitle { color: rgba(0,0,0,0.4); }
  .light .btn-new-note { border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.03); color: rgba(0,0,0,0.6); }
  .light .btn-new-note:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.9); }
  .light .notes-search { border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.03); color: rgba(0,0,0,0.8); }
  .light .notes-search::placeholder { color: rgba(0,0,0,0.3); }
  .light .note-card:hover { background: rgba(0,0,0,0.04); }
  .light .note-card.active { background: rgba(0,0,0,0.06); }
  .light .note-card-title { color: rgba(0,0,0,0.85); }
  .light .note-card-preview { color: rgba(0,0,0,0.4); }
  .light .note-card-date { color: rgba(0,0,0,0.25); }
  .light .editor-toolbar { border-bottom-color: rgba(0,0,0,0.06); }
  .light .toolbar-btn { color: rgba(0,0,0,0.4); }
  .light .toolbar-btn:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.8); }
  .light .toolbar-btn.active { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.9); }
  .light .toolbar-sep { background: rgba(0,0,0,0.1); }
  .light .toolbar-delete:hover { color: rgba(200,50,50,0.7); background: rgba(200,50,50,0.06); }
  .light .editor-title { color: rgba(0,0,0,0.9); }
  .light .editor-title::placeholder { color: rgba(0,0,0,0.25); }
  .light .editor-date { color: rgba(0,0,0,0.3); }
  .light .editor-content { color: rgba(0,0,0,0.7); }
  .light .editor-content:empty::before { color: rgba(0,0,0,0.25); }
  .light .editor-content b { color: rgba(0,0,0,0.9); }
  .light .editor-content mark { background: rgba(255,230,0,0.3); color: rgba(0,0,0,0.9); }
  .light .empty-state { color: rgba(0,0,0,0.25); }
  .light .theme-toggle { border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.03); color: rgba(0,0,0,0.5); }
  .light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
</style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-title">maimouarkwest</div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Mon mémoire
      </div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
        Progression
      </div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
        Succès
      </div>
      <div class="sidebar-item active notes-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.5 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8.5L15.5 3z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        Pense-bêtes
        <span class="notes-badge">3</span>
      </div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Réglages
      </div>
    </div>

    <!-- Notes panel -->
    <div class="notes-container">
      <!-- Notes list -->
      <div class="notes-list">
        <div class="notes-list-header">
          <div class="notes-list-title">Pense-bêtes</div>
          <div style="display:flex;gap:6px">
            <button class="btn-new-note" onclick="createNote()" title="Nouvelle note">+</button>
            <button class="btn-new-note" onclick="toggleList()" title="Rétracter" id="collapseBtn">«</button>
          </div>
        </div>
        <div class="notes-list-subtitle">Écris toutes tes idées ici pour ne plus les perdre.</div>
        <input class="notes-search" placeholder="Rechercher..." oninput="filterNotes(this.value)">
        <div class="notes-items" id="notesList"></div>
      </div>

      <!-- Editor -->
      <div class="editor-panel" id="editorPanel">
        <div id="editorContent"></div>
      </div>
    </div>
  </div>

  <button class="theme-toggle" onclick="toggleTheme()">Mode clair</button>

  <script>
    // ── Data ──
    let notes = [
      {
        id: 1,
        title: "Idées pour l'introduction",
        content: "Penser à mentionner <b>l'évolution du marché</b> ces 5 dernières années. Aussi : comparer avec le mémoire de Sarah sur le même sujet.\n\nAjouter une citation de <mark>Porter (2019)</mark> sur les forces concurrentielles.",
        date: new Date(2026, 2, 5, 14, 30)
      },
      {
        id: 2,
        title: "Questions pour le tuteur",
        content: "- Est-ce que la partie <u>méthodologie</u> doit inclure le questionnaire complet ?\n- Nombre de pages recommandé pour la <i>revue de littérature</i> ?\n- Deadline pour la première relecture ?",
        date: new Date(2026, 2, 4, 10, 15)
      },
      {
        id: 3,
        title: "Sources à vérifier",
        content: "Vérifier les stats INSEE 2024 sur le taux d'emploi des alternants. Le lien que j'avais ne marche plus.\n\n<b>Aussi</b> : relire l'article de <mark>Dupont & Martin (2023)</mark> sur la transformation digitale.",
        date: new Date(2026, 2, 3, 18, 45)
      }
    ];
    let activeNoteId = 1;
    let nextId = 4;

    // ── Render ──
    function renderNotesList() {
      const list = document.getElementById('notesList');
      list.innerHTML = notes.map(n => `
        <div class="note-card ${n.id === activeNoteId ? 'active' : ''}" onclick="selectNote(${n.id})">
          <div class="note-card-title">${n.title || 'Sans titre'}</div>
          <div class="note-card-preview">${stripHtml(n.content) || 'Note vide'}</div>
          <div class="note-card-date">${formatDate(n.date)}</div>
        </div>
      `).join('');
    }

    function renderEditor() {
      const panel = document.getElementById('editorContent');
      const note = notes.find(n => n.id === activeNoteId);

      if (!note) {
        panel.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M15.5 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8.5L15.5 3z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <div class="empty-state-text">Sélectionne ou crée une note</div>
          </div>
        `;
        return;
      }

      panel.innerHTML = `
        <div class="editor-toolbar">
          <button class="toolbar-btn" onclick="toggleList()" title="Afficher la liste" id="expandBtn" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
          <div class="toolbar-sep" id="expandSep" style="display:none"></div>
          <button class="toolbar-btn" onclick="execFormat('bold')" title="Gras (Ctrl+B)"><b>G</b></button>
          <button class="toolbar-btn" onclick="execFormat('italic')" title="Italique (Ctrl+I)"><i>I</i></button>
          <button class="toolbar-btn" onclick="execFormat('underline')" title="Souligné (Ctrl+U)"><u>S</u></button>
          <button class="toolbar-btn" onclick="execFormat('highlight')" title="Surligner">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="10" width="12" height="4" rx="1" fill="currentColor" opacity="0.25"/>
              <path d="M4 10V6l4-4 4 4v4"/>
            </svg>
          </button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="execFormat('strikethrough')" title="Barré"><s>B</s></button>
          <div class="toolbar-spacer"></div>
          <button class="toolbar-btn toolbar-delete" onclick="deleteNote(${note.id})" title="Supprimer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
          </button>
        </div>
        <div class="editor-area">
          <input class="editor-title" value="${note.title}" placeholder="Titre de la note" oninput="updateTitle(this.value)">
          <div class="editor-date">${formatDateFull(note.date)}</div>
          <div class="editor-content" contenteditable="true" id="editorBody" oninput="updateContent()">${note.content}</div>
        </div>
      `;
    }

    // ── Actions ──
    function selectNote(id) {
      activeNoteId = id;
      renderNotesList();
      renderEditor();
    }

    function createNote() {
      const newNote = {
        id: nextId++,
        title: '',
        content: '',
        date: new Date()
      };
      notes.unshift(newNote);
      activeNoteId = newNote.id;
      renderNotesList();
      renderEditor();
      // Focus title
      setTimeout(() => {
        const titleInput = document.querySelector('.editor-title');
        if (titleInput) titleInput.focus();
      }, 50);
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      if (activeNoteId === id) {
        activeNoteId = notes.length > 0 ? notes[0].id : null;
      }
      renderNotesList();
      renderEditor();
    }

    function updateTitle(value) {
      const note = notes.find(n => n.id === activeNoteId);
      if (note) {
        note.title = value;
        note.date = new Date();
        renderNotesList();
      }
    }

    function updateContent() {
      const body = document.getElementById('editorBody');
      const note = notes.find(n => n.id === activeNoteId);
      if (note && body) {
        note.content = body.innerHTML;
        note.date = new Date();
        // Don't re-render list on every keystroke, debounce
        clearTimeout(window._listTimeout);
        window._listTimeout = setTimeout(renderNotesList, 500);
      }
    }

    function execFormat(type) {
      if (type === 'highlight') {
        const sel = window.getSelection();
        if (sel.rangeCount > 0 && !sel.isCollapsed) {
          const range = sel.getRangeAt(0);
          // Check if already highlighted
          const parent = sel.anchorNode.parentElement;
          if (parent && parent.tagName === 'MARK') {
            const text = document.createTextNode(parent.textContent);
            parent.parentNode.replaceChild(text, parent);
          } else {
            const mark = document.createElement('mark');
            range.surroundContents(mark);
          }
        }
      } else {
        document.execCommand(type, false, null);
      }
      document.getElementById('editorBody')?.focus();
    }

    function filterNotes(query) {
      const cards = document.querySelectorAll('.note-card');
      const q = query.toLowerCase();
      let idx = 0;
      notes.forEach(n => {
        const match = n.title.toLowerCase().includes(q) || stripHtml(n.content).toLowerCase().includes(q);
        if (cards[idx]) cards[idx].style.display = match ? '' : 'none';
        idx++;
      });
    }

    // ── Helpers ──
    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || '';
    }

    function formatDate(d) {
      const now = new Date();
      const diff = now - d;
      if (diff < 3600000) return `Il y a ${Math.floor(diff/60000)} min`;
      if (diff < 86400000) return `Aujourd'hui, ${d.getHours()}h${String(d.getMinutes()).padStart(2,'0')}`;
      if (diff < 172800000) return `Hier, ${d.getHours()}h${String(d.getMinutes()).padStart(2,'0')}`;
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    }

    function formatDateFull(d) {
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) +
             ` à ${d.getHours()}h${String(d.getMinutes()).padStart(2,'0')}`;
    }

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); execFormat('bold'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'i') { e.preventDefault(); execFormat('italic'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'u') { e.preventDefault(); execFormat('underline'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'h') { e.preventDefault(); execFormat('highlight'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); createNote(); }
    });

    // ── Collapse/Expand list ──
    let listCollapsed = false;
    function toggleList() {
      listCollapsed = !listCollapsed;
      const list = document.querySelector('.notes-list');
      const expandBtn = document.getElementById('expandBtn');
      const expandSep = document.getElementById('expandSep');
      if (listCollapsed) {
        list.classList.add('collapsed');
        expandBtn.style.display = '';
        expandSep.style.display = '';
      } else {
        list.classList.remove('collapsed');
        expandBtn.style.display = 'none';
        expandSep.style.display = 'none';
      }
    }

    // ── Theme ──
    function toggleTheme() {
      document.body.classList.toggle('light');
      document.querySelector('.theme-toggle').textContent =
        document.body.classList.contains('light') ? 'Mode sombre' : 'Mode clair';
    }

    // ── Init ──
    renderNotesList();
    renderEditor();
  </script>
</body>
</html>
